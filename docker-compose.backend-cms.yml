version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: designbyshoug-backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ZIINA_SECRET_KEY=${ZIINA_SECRET_KEY}
      - ZIINA_WEBHOOK_SECRET=${ZIINA_WEBHOOK_SECRET}
      - MAILTRAP_TOKEN=${MAILTRAP_TOKEN}
      - MAILTRAP_SENDER_EMAIL=${MAILTRAP_SENDER_EMAIL}
      - MAILTRAP_SENDER_NAME=${MAILTRAP_SENDER_NAME}
      - OWNER_EMAILS=${OWNER_EMAILS}
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
      - coolify-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"
      - "traefik.http.routers.https-0-${COOLIFY_RESOURCE_UUID}-backend.service=backend"
      - "traefik.http.routers.https-1-${COOLIFY_RESOURCE_UUID}-backend.service=backend"
      - "traefik.http.routers.http-0-${COOLIFY_RESOURCE_UUID}-backend.service=backend"
      - "traefik.http.routers.http-1-${COOLIFY_RESOURCE_UUID}-backend.service=backend"
      - "traefik.docker.network=coolify"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun --eval "fetch(''http://localhost:3001/health'').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 120s

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    container_name: designbyshoug-cms
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - coolify-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.cms.loadbalancer.server.port=80"
      - "traefik.http.routers.https-0-${COOLIFY_RESOURCE_UUID}-cms.service=cms"
      - "traefik.http.routers.https-1-${COOLIFY_RESOURCE_UUID}-cms.service=cms"
      - "traefik.http.routers.http-0-${COOLIFY_RESOURCE_UUID}-cms.service=cms"
      - "traefik.http.routers.http-1-${COOLIFY_RESOURCE_UUID}-cms.service=cms"
      - "traefik.docker.network=coolify"

networks:
  coolify-network:
    external: true
    name: ${COOLIFY_DB_NETWORK:-coolify}
